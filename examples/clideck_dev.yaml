id: clideck_dev
label: "CliDeck: Run Dev Server"
description: "Launch CliDeck in development mode with hot-reload"
bin: cargo
install:
  brew: rustup
  notes: "After installing rustup, run: rustup-init to set up Rust and Cargo"
args:
  - key: release_mode
    type: bool
    default: false
    label: "Release Mode"
command:
  - "{bin}"
  - "tauri"
  - "dev"
outputs: []
