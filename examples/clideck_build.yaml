id: clideck_build
label: "CliDeck: Build App"
description: "Build the CliDeck application for production release"
bin: cargo
install:
  brew: rustup
  notes: "After installing rustup, run: rustup-init to set up Rust and Cargo"
args:
  - key: profile
    type: enum
    values: [release, debug]
    default: release
    label: "Build Profile"
  - key: verbose
    type: bool
    default: false
    label: "Verbose Output"
command:
  - "{bin}"
  - "tauri"
  - "build"
outputs: []
