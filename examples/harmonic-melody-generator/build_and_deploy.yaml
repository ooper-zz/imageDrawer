id: harmonic_build_deploy
label: "Harmonic: Build & Deploy"
description: "Build the Flutter web app then deploy to cPanel (chained)"
bin: flutter
cwd: /Users/carlgarcia/Documents/GitHub/harmonic-melody-generator
env:
  FLUTTER_WEB_RENDERER: canvaskit
args:
  - key: base_href
    type: text
    label: "Base Href"
    default: "/melodycurve/"
    placeholder: "/my-app/"
command:
  - "{bin}"
  - "build"
  - "web"
  - "--release"
  - "--base-href"
  - "{base_href}"
chain:
  - label: "Build Web"
    bin: flutter
    command:
      - "{bin}"
      - "build"
      - "web"
      - "--release"
      - "--base-href"
      - "{base_href}"
    env:
      FLUTTER_WEB_RENDERER: canvaskit
  - label: "Deploy to cPanel"
    bin: bash
    command:
      - "{bin}"
      - "/Users/carlgarcia/Documents/GitHub/harmonic-melody-generator/deploy.sh"
      - "cpanel"
