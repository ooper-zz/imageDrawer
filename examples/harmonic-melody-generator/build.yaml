id: harmonic_build
label: "Harmonic: Build Web"
description: "Build the Flutter web app for release"
bin: flutter
cwd: /Users/carlgarcia/Documents/GitHub/harmonic-melody-generator
install:
  brew: flutter
  cask: true
  notes: "Requires Flutter SDK. Install via: brew install --cask flutter"
args:
  - key: base_href
    type: text
    label: "Base Href"
    default: "/melodycurve/"
    placeholder: "/my-app/"
command:
  - "{bin}"
  - "build"
  - "web"
  - "--release"
  - "--base-href"
  - "{base_href}"
