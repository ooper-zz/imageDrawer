id: clideck_deploy
label: "CliDeck: Deploy to Applications"
description: "Copy the built CliDeck.app bundle into /Applications"
bin: cp
args:
  - key: source
    type: text
    required: true
    default: "src-tauri/target/release/bundle/macos/CliDeck.app"
    label: "Built App Path"
  - key: destination
    type: text
    required: true
    default: "/Applications/CliDeck.app"
    label: "Install Destination"
command:
  - "{bin}"
  - "-R"
  - "{source}"
  - "{destination}"
outputs: []
