id: clideck_full_deploy
label: "CliDeck: Build & Deploy"
description: "Build the app for release, then copy to /Applications (chained)"
bin: cargo
cwd: /Users/carlgarcia/Documents/GitHub/cliDeck
env:
  RUST_BACKTRACE: "1"
args:
  - key: profile
    type: enum
    values: [release, debug]
    default: release
    label: "Build Profile"
command:
  - "{bin}"
  - "tauri"
  - "build"
chain:
  - label: "Build App"
    bin: cargo
    command:
      - "{bin}"
      - "tauri"
      - "build"
    env:
      RUST_BACKTRACE: "1"
  - label: "Deploy to Applications"
    bin: cp
    command:
      - "{bin}"
      - "-R"
      - "src-tauri/target/release/bundle/macos/CliDeck.app"
      - "/Applications/CliDeck.app"
