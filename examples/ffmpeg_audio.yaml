id: ffmpeg_audio
label: "FFmpeg: Extract Audio"
description: "Extract audio from video files and convert to various formats"
bin: ffmpeg
install:
  brew: ffmpeg
args:
  - key: input
    type: file
    required: true
    label: "Input Video File"
  - key: codec
    type: enum
    values: [libmp3lame, pcm_s16le, aac, flac]
    default: libmp3lame
    label: "Audio Codec"
  - key: format
    type: enum
    values: [mp3, wav, m4a, flac]
    default: mp3
    label: "Output Format"
  - key: bitrate
    type: int
    default: 192
    label: "Bitrate (kbps)"
    min: 64
    max: 320
command:
  - "{bin}"
  - "-y"
  - "-i"
  - "{input}"
  - "-vn"
  - "-c:a"
  - "{codec}"
  - "-b:a"
  - "{bitrate}k"
  - "{output}"
outputs:
  - key: output
    type: save_file
    defaultTemplate: "{inputDir}/{inputStem}_extracted.{format}"
