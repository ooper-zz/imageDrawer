id: git_clone
label: "Git: Clone Repository"
description: "Clone a Git repository to a local directory"
bin: git
install:
  brew: git
  notes: "git is usually available via Xcode Command Line Tools"
args:
  - key: repo_url
    type: text
    required: true
    label: "Repository URL"
    placeholder: "https://github.com/user/repo.git"
  - key: target_dir
    type: text
    required: true
    label: "Target Directory"
    placeholder: "my-project"
  - key: depth
    type: int
    default: 0
    label: "Clone Depth (0 = full history)"
    min: 0
  - key: branch
    type: text
    label: "Branch Name (optional)"
    placeholder: "main"
command:
  - "{bin}"
  - "clone"
  - "{repo_url}"
  - "{target_dir}"
outputs: []
