name: image_to_vector
description: A Flutter app that converts images to vector art with animated drawing visualization
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  image_picker: ^1.0.4
  path_provider: ^2.1.1
  vector_graphics_compiler: ^1.1.9
  vector_graphics: ^1.1.9
  cupertino_icons: ^1.0.2
  flutter_svg: ^2.0.7
  permission_handler: ^11.0.1
  universal_html: ^2.2.4
  xml: ^6.3.0
  image: ^4.1.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
